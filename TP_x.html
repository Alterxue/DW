    <!DOCTYPE html>
    <html>
    <head>
        <title>TP 3IF DW 2026</title>
    
    </head>
    <body>
        <p>
            <button onclick="changeToBlue()">Blue</button>
            <button onclick="changeToWhite()">White</button>
            <input type = "text" id= "ftext" name="ftext">
            <button onclick="Addtext()">add text</button>
            <button id = "clickabletext" onclick = "copytext()"> clickabletext </button>
            <button onclick = "initializeMap()">Load svg</button>
            <button id = "clickablesvg" onclick = "clickablesvg()">clickagesvg</button>
            <ol id="myList"></ol>
            <svg width="309" height="349" id = "svgContainer"></svg>
        </p>
    </body>
    </html>


    <script>
        function changeToBlue(){
            document.body.style.backgroundColor = "blue";
        }
    </script>

    <script>
        function changeToWhite(){
            document.body.style.backgroundColor = "white";
        }
    </script>

    <script>
        function Addtext(){
            var input = document.getElementById("ftext");
            var mylist = document.getElementById("myList");
            var newLI = document.createElement("li");
            newLI.textContent = input.value;
            myList.appendChild(newLI);
            input.value = "";
        }
    </script>
    <!-- <script>
        function myfunction(newLI){
            console.log("debugger");
            document.getElementById('ftext').value = newLI;
        }
    </script> -->
    <script>
        function clickablesvg(){
            var container = document.getElementById("svgContainer");
            var pathitems = container.getElementsByTagName("path");
            for(let i=0; i<pathitems.length; i++){
                if (pathitems[i].getAttribute("id")){
                    pathitems[i].addEventListener("click",afficher);
                }
            } 
        }
        function afficher(){
            // console.log("debugger");
            console.log("clicked");
            document.getElementById('ftext').value = this.getAttribute("id")
        }

        function myfunction(){
            // console.log("debugger");
            document.getElementById('ftext').value = this.innerHTML;
        }

        function copytext(){
            var liste = document.getElementById("myList");
            var listitem = liste.getElementsByTagName("li");
            for(let ligne=0; ligne<listitem.length; ligne++){
                listitem[ligne].addEventListener("click",myfunction);
            } 
        }
    </script>

    <script>
        async function fetchSvgContent(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return await response.text();
            } catch (error) {
                console.error("Error fetching the SVG:", error);
                return null;
            }
        }
        async function initializeMap() {
            const svgData = await fetchSvgContent('lyon_districts.svg');
            if (svgData) {
                const container = document.getElementById("svgContainer");
                container.innerHTML = svgData;                
            }
        }        
    </script>
